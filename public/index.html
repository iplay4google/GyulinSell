<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GyulinSell</title>
<link rel="stylesheet" href="/css/index.css">
</head>

<body>

<div class="sidebar">
    <button onclick="location.href='login.html'">Already have an account?</button>
    <button onclick="location.href='signup.html'">Make an account</button>
    <button onclick="enterGuest()">Become a guest</button>

<script>
function enterGuest() {
    localStorage.setItem("isGuest", "true");
    window.location.href = "shop.html";
}
</script>

</body>
</html>

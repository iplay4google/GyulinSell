<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GyulinSell</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 200px;
            height: 100%;
            background: #eee;
            padding: 20px;
        }

        .sidebar button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }

        .product {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }

        .product button {
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <button id="guestBtn">Join as Guest</button>
    </div>

    <div class="content">
        <h1>Welcome to GyulinSell</h1>
        <div id="productsContainer">
            <!-- Products will load here -->
        </div>
    </div>

    <script src="shop.js"></script>
</body>
</html>

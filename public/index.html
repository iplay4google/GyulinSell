<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GyulinSell</title>
<link rel="stylesheet" href="index.css">
</head>
<body>
<div id="buttons">
    <button id="login-btn">Already have an account?</button>
    <button id="register-btn">Make a new account</button>
    <button id="guest-btn">Become a Guest</button>
</div>

<script>
document.getElementById('login-btn').onclick = () => window.location.href = 'login.html';
document.getElementById('register-btn').onclick = () => window.location.href = 'register.html';
document.getElementById('guest-btn').onclick = () => window.location.href = 'shop.html?guest=true';
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GyulinSell</title>
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
  .container { display: flex; height: 100vh; align-items: center; justify-content: center; }
  .buttons { display: flex; flex-direction: column; gap: 20px; }
  button { padding: 15px 30px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; }
  button:hover { opacity: 0.9; }
  .guest { background-color: #6c757d; color: white; }
  .login { background-color: #007bff; color: white; }
  .signup { background-color: #28a745; color: white; }
</style>
</head>
<body>
<div class="container">
  <div class="buttons">
    <button class="signup" onclick="location.href='signup.html'">Make an account?</button>
    <button class="login" onclick="location.href='login.html'">Already have an account?</button>
    <button class="guest" onclick="becomeGuest()">Become a guest</button>
  </div>
</div>

<script>
function becomeGuest() {
  sessionStorage.setItem('guest', 'true');
  window.location.href = 'shop.html';
}
</script>
</body>
</html>

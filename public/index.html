<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GyulinSell</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        body {
            display: flex;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .sidebar {
            width: 200px;
            background-color: #f0f0f0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
        }
        .sidebar button {
            display: block;
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            cursor: pointer;
        }
        .content {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <button onclick="location.href='login.html'">Already have an account?</button>
        <button onclick="location.href='signup.html'">Make an account</button>
        <button onclick="location.href='shop.html?guest=true'">Become a guest</button>
    </div>
    <div class="content">
        <h1>Welcome to GyulinSell!</h1>
        <p>Browse amazing products by signing up, logging in, or as a guest!</p>
    </div>
</body>
</html>

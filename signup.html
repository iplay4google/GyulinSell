<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - GyulinSell</title>
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;}
  form { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
  input { display: block; margin: 15px 0; padding: 10px; width: 250px; }
  button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
</style>
</head>
<body>
<form id="signupForm">
  <h2>Create Account</h2>
  <input type="text" id="username" placeholder="Username" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>
  <button type="submit">Sign Up</button>
</form>

<script>
const signupForm = document.getElementById('signupForm');
signupForm.addEventListener('submit', function(e) {
  e.preventDefault();
  alert('Account created! Please log in.');
  window.location.href = 'login.html';
});
</script>
</body>
</html>
